# ============================================
# 1. Cấu hình kết nối SQL Server (ĐÃ KHÔI PHỤC)
# ============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=job_platform;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123456
# Mày có thể bỏ dòng driver-class-name vì Spring Boot tự nhận diện SQL Server rất tốt

# ============================================
# 2. Cấu hình Hibernate (JPA SQL Server)
# ============================================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# 3. Đổi cổng chạy
# ============================================
server.port=8090

# ============================================
# 4. Cấu hình Upload File (CV, Logo, Avatar)
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# ============================================
# 5. JWT Secret Key
# ============================================
jwt.secret=ChuyenDeTotNghiepCongNghePhanMemSTU2026
jwt.access-token-expiry=420000
jwt.refresh-token-expiry=432000